name: Build Portal with Secrets

on:
  push:
    branches: [main]
    paths:
      - 'portal.html'
      - 'scripts/inject-secrets.js'
      - '.github/workflows/deploy.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Verify Portal

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Inject secrets into portal.html
        env:
          SUPABASE_URL: https://wpxcgducfkbozecknfdw.supabase.co
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          SENTRY_DSN: ${{ secrets.SENTRY_DSN }}
          NODE_ENV: production
        run: |
          node scripts/inject-secrets.js
          echo "✅ Secrets injected successfully"

      - name: Verify secrets injection
        run: |
          if grep -q "window.__ENV" portal.html; then
            echo "✅ Secrets verification passed"
          else
            echo "❌ Secrets injection failed"
            exit 1
          fi

      - name: Build complete
        run: |
          echo "✅ Portal build complete"
          echo "✅ Ready for deployment"
