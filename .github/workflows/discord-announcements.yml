name: Community Announcements (Discord + Telegram)

# Sonntags 10:30 UTC (nach den Reports) + manueller Start
on:
  schedule:
    - cron: '30 10 * * 0'
  workflow_dispatch:

jobs:
  announce:
    runs-on: ubuntu-latest
    name: Weekly community announcement
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Ankuendigung posten (Discord + Telegram, beide optional)
        env:
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python .github/scripts/community_announce.py
